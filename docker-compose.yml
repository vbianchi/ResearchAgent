version: '3.8'

services:
  backend:
    build: .
    container_name: research_agent_backend
    network_mode: host
    
    # <<< START MODIFICATION: Update volume mounts >>>
    # We will mount the entire current directory to /app
    # This ensures that any file created in /app inside the container
    # will appear in our local project directory.
    volumes:
      - .:/app
    # <<< END MODIFICATION >>>

    restart: unless-stopped
    env_file:
      - .env